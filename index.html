          const nextCard = () => {
            setIsFlipped(false);
            setTimeout(() => setIndex((prev) => (prev + 1) % vocabData.length), 150);
          };
          const prevCard = () => {
            setIsFlipped(false);
            setTimeout(() => setIndex((prev) => (prev - 1 + vocabData.length) % vocabData.length), 150);
          };

          const card = vocabData[index];

          return (
            <div className="flex flex-col items-center justify-center min-h-[60vh]">
              <div className="text-white/80 mb-6 font-medium tracking-wider">{index + 1} / {vocabData.length}</div>
              
              <div 
                className="relative w-full max-w-md h-80 perspective-1000 cursor-pointer group"
                onClick={() => setIsFlipped(!isFlipped)}
              >
                <div className={`w-full h-full transition-transform duration-700 preserve-3d relative ${isFlipped ? 'rotate-y-180' : ''}`}>
                  
                  {/* Front */}
                  <div className="absolute w-full h-full backface-hidden bg-white/10 backdrop-blur-lg border border-white/20 rounded-3xl p-8 flex flex-col items-center justify-center shadow-2xl">
                     <button 
                        onClick={(e) => { e.stopPropagation(); playAudio(card.zh); }}
                        className="absolute top-6 right-6 p-3 bg-white/10 hover:bg-white/20 rounded-full transition-colors text-white"
                      >
                        <Volume2 size={24} />
                      </button>
                      <h2 className="text-8xl font-bold text-white mb-4 drop-shadow-lg">{card.zh}</h2>
                  </div>

                  {/* Back */}
                  <div className="absolute w-full h-full backface-hidden rotate-y-180 bg-gradient-to-br from-indigo-500/80 to-purple-600/80 backdrop-blur-xl border border-white/30 rounded-3xl p-8 flex flex-col items-center justify-center shadow-2xl text-center">
                     <button 
                        onClick={(e) => { e.stopPropagation(); playAudio(card.zh); }}
                        className="absolute top-6 right-6 p-3 bg-white/20 hover:bg-white/30 rounded-full transition-colors text-white"
                      >
                        <Volume2 size={24} />
                      </button>
                     <h3 className="text-4xl font-bold text-white mb-6 tracking-wide">{card.py}</h3>
                     <div className="w-16 h-1 bg-white/40 rounded-full mb-6"></div>
                     <p className="text-xl text-white/90 mb-2"><span className="font-semibold text-indigo-100 mr-2">UZ:</span> {card.uz}</p>
                     <p className="text-xl text-white/90 mb-2"><span className="font-semibold text-indigo-100 mr-2">RU:</span> {card.ru}</p>
                     <p className="text-xl text-white/90"><span className="font-semibold text-indigo-100 mr-2">EN:</span> {card.en}</p>
                  </div>
                </div>
              </div>

              <div className="flex space-x-6 mt-10">
                <button onClick={prevCard} className="px-6 py-3 rounded-full bg-white/10 hover:bg-white/20 text-white font-medium transition-colors border border-white/10 flex items-center">
                  <ChevronLeft size={20} className="mr-2" /> Oldingi
                </button>
                <button onClick={nextCard} className="px-6 py-3 rounded-full bg-white/20 hover:bg-white/30 text-white font-medium transition-colors border border-white/20 flex items-center shadow-[0_0_15px_rgba(255,255,255,0.1)]">
                  Keyingi <ChevronRight size={20} className="ml-2" />
                </button>
              </div>
            </div>
          );
        };

        const Quiz = ({ questions, title }) => {
          const [currentQ, setCurrentQ] = useState(0);
          const [score, setScore] = useState(0);
          const [showResult, setShowResult] = useState(false);
          const [selectedOpt, setSelectedOpt] = useState(null);
          const [isAnswered, setIsAnswered] = useState(false);

          const handleOptionClick = (idx) => {
            if (isAnswered) return;
            setSelectedOpt(idx);
            setIsAnswered(true);
            if (idx === questions[currentQ].ans) {
              setScore(score + 1);
            }
          };

          const nextQ = () => {
            if (currentQ < questions.length - 1) {
              setCurrentQ(currentQ + 1);
              setSelectedOpt(null);
              setIsAnswered(false);
            } else {
              setShowResult(true);
            }
          };

          const reset = () => {
            setCurrentQ(0);
            setScore(0);
            setShowResult(false);
            setSelectedOpt(null);
            setIsAnswered(false);
          };

          if (showResult) {
            return (
              <div className="flex flex-col items-center justify-center min-h-[50vh] bg-white/5 backdrop-blur-md border border-white/10 rounded-3xl p-10 max-w-2xl mx-auto shadow-2xl">
                <Award size={80} className="text-yellow-400 mb-6 drop-shadow-[0_0_15px_rgba(250,204,21,0.5)]" />
                <h2 className="text-4xl font-bold text-white mb-4">Natija</h2>
                <p className="text-2xl text-white/80 mb-8">Siz {questions.length} ta savoldan <span className="text-3xl font-bold text-green-400 mx-2">{score}</span> tasiga to'g'ri javob berdingiz!</p>
                <button onClick={reset} className="px-8 py-4 bg-indigo-500/80 hover:bg-indigo-500 text-white rounded-full font-bold text-lg transition-all shadow-[0_0_20px_rgba(99,102,241,0.4)] flex items-center">
                  <RotateCcw size={22} className="mr-3" /> Qayta urinib ko'rish
                </button>
              </div>
            );
          }

          const q = questions[currentQ];

          return (
            <div className="max-w-2xl mx-auto min-h-[50vh] flex flex-col justify-center">
              <div className="bg-white/10 backdrop-blur-lg border border-white/20 rounded-3xl p-8 shadow-2xl relative overflow-hidden">
                <div className="absolute top-0 left-0 h-1 bg-white/20 w-full">
                  <div className="h-full bg-indigo-400 transition-all duration-500" style={{ width: `${((currentQ) / questions.length) * 100}%` }}></div>
                </div>
                
                <div className="flex justify-between items-center mb-8">
                  <span className="text-indigo-200 font-medium text-lg px-4 py-1 bg-indigo-900/40 rounded-full border border-indigo-500/30">Savol {currentQ + 1} / {questions.length}</span>
                  <span className="text-white/60">{title}</span>
                </div>

                {q.q_py && <h4 className="text-2xl md:text-3xl font-medium text-indigo-300 text-center mb-2 tracking-wide">{q.q_py}</h4>}
                <h3 className="text-4xl md:text-6xl font-bold text-white text-center mb-12 drop-shadow-md">{q.q}</h3>

                <div className="grid grid-cols-1 sm:grid-cols-2 gap-4">
                  {q.options.map((opt, idx) => {
                    let btnClass = "bg-white/5 border-white/10 hover:bg-white/15 text-white/90";
                    let Icon = null;
                    
                    if (isAnswered) {
                      if (idx === q.ans) {
                        btnClass = "bg-green-500/20 border-green-500/50 text-green-100 shadow-[0_0_15px_rgba(34,197,94,0.2)]";
                        Icon = CheckCircle2;
                      } else if (idx === selectedOpt) {
                        btnClass = "bg-red-500/20 border-red-500/50 text-red-100";
                        Icon = XCircle;
                      } else {
                        btnClass = "bg-white/5 border-white/5 text-white/30 opacity-50";
                      }
                    }

                    return (
                      <button
                        key={idx}
                        onClick={() => handleOptionClick(idx)}
                        className={`relative flex items-center justify-between p-5 rounded-2xl border transition-all duration-300 text-lg font-medium ${btnClass}`}
                      >
                        <span>{opt}</span>
                        {Icon && <Icon size={24} className={idx === q.ans ? "text-green-400" : "text-red-400"} />}
                      </button>
                    );
                  })}
                </div>

                {isAnswered && (
                  <div className="mt-10 flex justify-end animate-fade-in">
                    <button onClick={nextQ} className="px-8 py-3 bg-white text-indigo-900 rounded-full font-bold hover:bg-indigo-50 transition-colors shadow-[0_0_20px_rgba(255,255,255,0.3)] flex items-center">
                      Keyingi <ChevronRight size={20} className="ml-2" />
                    </button>
                  </div>
                )}
              </div>
            </div>
          );
        };

        const Dialogues = () => {
          return (
            <div className="max-w-4xl mx-auto space-y-12 pb-10">
              {dialogueData.map((dialogue, idx) => (
                <div key={idx} className="bg-white/10 backdrop-blur-lg border border-white/20 rounded-3xl p-8 shadow-2xl">
                  <h2 className="text-3xl font-bold text-white border-b border-white/10 pb-4 mb-6">{dialogue.title}</h2>
                  <div className="space-y-6">
                    {dialogue.lines.map((line, lIdx) => (
                      <div key={lIdx} className="group relative bg-white/5 hover:bg-white/10 transition-colors rounded-2xl p-6 border border-white/5">
                        <button 
                          onClick={() => playAudio(line.zh)}
                          className="absolute right-6 top-6 p-3 bg-white/10 hover:bg-white/20 rounded-full transition-colors text-white opacity-0 group-hover:opacity-100"
                        >
                          <Volume2 size={20} />
                        </button>
                        <div className="flex flex-col space-y-2 pr-12">
                          <div className="text-sm font-bold text-indigo-300 uppercase tracking-wider">{line.speaker}</div>
                          <div className="text-3xl font-bold text-white tracking-wide">{line.zh}</div>
                          <div className="text-xl text-indigo-200 font-medium mb-2">{line.py}</div>
                          <div className="grid grid-cols-1 md:grid-cols-3 gap-4 pt-4 border-t border-white/5 mt-2">
                            <div className="text-white/80"><span className="text-xs text-white/40 block mb-1 uppercase font-bold">Uzbek</span> {line.uz}</div>
                            <div className="text-white/80"><span className="text-xs text-white/40 block mb-1 uppercase font-bold">Russian</span> {line.ru}</div>
                            <div className="text-white/80"><span className="text-xs text-white/40 block mb-1 uppercase font-bold">English</span> {line.en}</div>
                          </div>
                        </div>
                      </div>
                    ))}
                  </div>
                </div>
              ))}
            </div>
          );
        };

        const Grammar = () => {
          return (
            <div className="max-w-4xl mx-auto space-y-8 pb-10">
              {grammarData.map((item, idx) => (
                <div key={idx} className="bg-white/10 backdrop-blur-lg border border-white/20 rounded-3xl p-8 shadow-2xl">
                  <h2 className="text-2xl font-bold text-white mb-6 flex items-center">
                    <BookOpen className="mr-3 text-indigo-300" /> {item.title}
                  </h2>
                  <div className="bg-black/20 rounded-2xl p-6 mb-6 border border-white/5">
                    <p className="text-lg text-white/90 mb-3"><span className="font-bold text-indigo-300 mr-2">UZ:</span>{item.explanation.uz}</p>
                    <p className="text-lg text-white/90 mb-3"><span className="font-bold text-indigo-300 mr-2">RU:</span>{item.explanation.ru}</p>
                    <p className="text-lg text-white/90"><span className="font-bold text-indigo-300 mr-2">EN:</span>{item.explanation.en}</p>
                  </div>
                  <h3 className="text-xl font-semibold text-white/80 mb-4 px-2">Examples:</h3>
                  <div className="space-y-3">
                    {item.examples.map((ex, eIdx) => (
                      <div key={eIdx} className="bg-white/5 rounded-xl p-5 border border-white/10 flex items-center justify-between hover:bg-white/10 transition-colors group">
                        <div>
                          <div className="text-2xl font-bold text-white mb-1">{ex.zh}</div>
                          <div className="text-lg text-indigo-200">{ex.py}</div>
                          <div className="text-md text-white/70 mt-1">{ex.uz}</div>
                        </div>
                        <button onClick={() => playAudio(ex.zh)} className="p-3 bg-white/10 hover:bg-white/20 rounded-full transition-colors text-white opacity-0 group-hover:opacity-100">
                          <Volume2 size={20} />
                        </button>
                      </div>
                    ))}
                  </div>
                </div>
              ))}
            </div>
          );
        };

        const FillInTheBlanks = () => {
          const [answers, setAnswers] = useState(Array(fillBlanksQuestions.length).fill(""));
          const [submitted, setSubmitted] = useState(false);

          const handleSelect = (idx, value) => {
            if (submitted) return;
            const newAns = [...answers];
            newAns[idx] = value;
            setAnswers(newAns);
          };

          const calculateScore = () => {
            let s = 0;
            answers.forEach((ans, i) => {
              if (ans === fillBlanksQuestions[i].answer) s++;
            });
            return s;
          };

          const reset = () => {
            setAnswers(Array(fillBlanksQuestions.length).fill(""));
            setSubmitted(false);
          };

          return (
            <div className="max-w-3xl mx-auto min-h-[50vh] pb-10">
              <div className="bg-white/10 backdrop-blur-lg border border-white/20 rounded-3xl p-8 sm:p-10 shadow-2xl">
                <h2 className="text-3xl font-bold text-white mb-8 flex items-center border-b border-white/10 pb-4">
                  <Edit3 className="mr-3 text-indigo-300" /> So'zlarni to'ldirish
                </h2>
                
                <div className="space-y-6">
                  {fillBlanksQuestions.map((q, idx) => {
                    const isCorrect = answers[idx] === q.answer;
                    return (
                      <div key={idx} className={`p-6 rounded-2xl border transition-colors ${submitted ? (isCorrect ? 'bg-green-500/10 border-green-500/30' : 'bg-red-500/10 border-red-500/30') : 'bg-white/5 border-white/10'}`}>
                        <div className="flex items-end flex-wrap gap-x-3 gap-y-4 text-2xl font-bold text-white mb-2">
                          <span className="mb-1 text-indigo-400">{idx + 1}.</span>
                          
                          {q.sentence[0] && (
                            <div className="flex flex-col items-center">
                              <span className="text-sm md:text-base font-normal text-indigo-300 h-6 leading-none tracking-wider">{q.sentence_py[0]}</span>
                              <span>{q.sentence[0]}</span>
                            </div>
                          )}

                          <div className="flex flex-col items-center relative">
                            <span className="text-sm font-normal text-transparent h-6 leading-none">_</span>
                            <select
                              value={answers[idx]}
                              onChange={(e) => handleSelect(idx, e.target.value)}
                              disabled={submitted}
                              className={`appearance-none bg-black/30 border-b-2 outline-none text-center px-4 py-2 min-w-[120px] cursor-pointer transition-colors
                                ${submitted ? (isCorrect ? 'border-green-400 text-green-300' : 'border-red-400 text-red-300') : 'border-indigo-400 focus:border-indigo-300 text-indigo-200'}`}
                            >
                              <option value="" disabled>___</option>
                              {q.options.map((opt, oIdx) => (
                                <option key={oIdx} value={opt} className="bg-slate-800 text-white">{opt}</option>
                              ))}
                            </select>
                          </div>

                          {q.sentence[1] && (
                            <div className="flex flex-col items-center">
                              <span className="text-sm md:text-base font-normal text-indigo-300 h-6 leading-none tracking-wider">{q.sentence_py[1]}</span>
                              <span>{q.sentence[1]}</span>
                            </div>
                          )}
                          
                          {submitted && (
                            <span className="ml-auto mb-1">
                              {isCorrect ? <CheckCircle2 className="text-green-400" size={28} /> : <XCircle className="text-red-400" size={28} />}
                            </span>
                          )}
                        </div>
                        {submitted && !isCorrect && (
                           <div className="mt-3 text-red-200 text-sm font-medium">To'g'ri javob: <span className="font-bold text-green-300 text-lg ml-2">{q.answer}</span></div>
                        )}
                      </div>
                    );
                  })}
                </div>

                <div className="mt-10 flex justify-center border-t border-white/10 pt-8">
                  {!submitted ? (
                    <button 
                      onClick={() => setSubmitted(true)}
                      disabled={answers.includes("")}
                      className="px-10 py-4 bg-indigo-500 hover:bg-indigo-400 disabled:opacity-50 disabled:cursor-not-allowed text-white rounded-full font-bold text-lg transition-all shadow-[0_0_20px_rgba(99,102,241,0.4)] flex items-center"
                    >
                      <Check className="mr-2" /> Tekshirish
                    </button>
                  ) : (
                    <div className="flex flex-col items-center">
                       <div className="text-3xl font-bold text-white mb-6">Natija: <span className="text-green-400 mx-2">{calculateScore()}</span> / {fillBlanksQuestions.length}</div>
                       <button onClick={reset} className="px-8 py-3 bg-white/20 hover:bg-white/30 text-white rounded-full font-bold transition-colors flex items-center">
                         <RotateCcw size={20} className="mr-2" /> Qayta urinib ko'rish
                       </button>
                    </div>
                  )}
                </div>
              </div>
            </div>
          );
        };

        const App = () => {
          const [activeTab, setActiveTab] = useState('flashcards');

          return (
            <div className="min-h-screen bg-[radial-gradient(ellipse_at_top_right,_var(--tw-gradient-stops))] from-slate-900 via-indigo-950 to-slate-900 font-sans text-slate-100 selection:bg-indigo-500/30 overflow-x-hidden">
              
              {/* Decorative Background Elements */}
              <div className="fixed top-[-10%] left-[-10%] w-[40%] h-[40%] rounded-full bg-indigo-600/20 blur-[120px] pointer-events-none"></div>
              <div className="fixed bottom-[-10%] right-[-10%] w-[40%] h-[40%] rounded-full bg-purple-600/20 blur-[120px] pointer-events-none"></div>

              <div className="container mx-auto px-4 py-8 relative z-10">
                
                {/* Header */}
                <header className="text-center mb-12">
                  <h1 className="text-5xl md:text-7xl font-extrabold text-transparent bg-clip-text bg-gradient-to-r from-indigo-200 via-white to-purple-200 mb-4 drop-shadow-sm">
                    昨天下雪了
                  </h1>
                  <p className="text-xl md:text-2xl text-indigo-200 font-medium tracking-wide">
                    Dilfuza Kāng lǎo shī bilan xitoy tilini o'rganmiz
                  </p>
                </header>

                {/* Navigation */}
                <div className="flex justify-start md:justify-center overflow-x-auto pb-4 mb-10 hide-scrollbar space-x-2">
                  <TabButton active={activeTab === 'flashcards'} onClick={() => setActiveTab('flashcards')} icon={BookOpen} label="Fleshkartalar" />
                  <TabButton active={activeTab === 'vocabQuiz'} onClick={() => setActiveTab('vocabQuiz')} icon={Activity} label="Lug'at Testi" />
                  <TabButton active={activeTab === 'dialogues'} onClick={() => setActiveTab('dialogues')} icon={MessageCircle} label="Muloqot" />
                  <TabButton active={activeTab === 'grammar'} onClick={() => setActiveTab('grammar')} icon={FileText} label="Grammatika" />
                  <TabButton active={activeTab === 'grammarQuiz'} onClick={() => setActiveTab('grammarQuiz')} icon={Award} label="Grammatika Testi" />
                  <TabButton active={activeTab === 'fillBlanks'} onClick={() => setActiveTab('fillBlanks')} icon={Edit3} label="So'zlarni to'ldirish" />
                </div>

                {/* Main Content Area */}
                <main className="min-h-[60vh] animate-fade-in pb-20">
                  {activeTab === 'flashcards' && <Flashcards />}
                  {activeTab === 'vocabQuiz' && <Quiz questions={vocabQuizQuestions} title="Lug'at Testi" />}
                  {activeTab === 'dialogues' && <Dialogues />}
                  {activeTab === 'grammar' && <Grammar />}
                  {activeTab === 'grammarQuiz' && <Quiz questions={grammarQuizQuestions} title="Grammatika Testi" />}
                  {activeTab === 'fillBlanks' && <FillInTheBlanks />}
                </main>

                {/* Footer */}
                <footer className="fixed bottom-0 left-0 w-full bg-black/30 backdrop-blur-md border-t border-white/10 py-4 text-center z-50">
                  <p className="text-white/60 text-sm font-medium">
                    HSK 1 NEW3.0 - Lesson 12 &copy; 2026 Dilfuza Kāng lǎo shī (telegram@diffila)
                  </p>
                </footer>
              </div>
            </div>
          );
        }

        // Mount the application
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
